<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UCP - Reserva de Espacios</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f0f2f5; color: #333; }
        h1 { color: #1f2937; border-bottom: 2px solid #3ecf8e; padding-bottom: 10px; }
        #recursos-lista { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 280px; border: 1px solid #e5e7eb; }
        .card h3 { margin-top: 0; color: #111827; }
        button { background: #3ecf8e; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #2eb87a; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
        .disponible { background: #dcfce7; color: #166534; }
        .reservada { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h1>🏢 Sistema de Reservas UCP</h1>
    <div id="recursos-lista">
        <p id="mensaje-estado">⏳ Conectando con la base de datos...</p>
    </div>

    <script>
        // 1. Configuración (Tus llaves reales)
        const SUPABASE_URL = 'https://wybiblrhcphwuhrmgkhv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5YmlibHJoY3Bod3Vocm1na2h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxOTUsImV4cCI6MjA4OTY3MjE5NX0.qiBG-FqFhI8IaRqlTT-qb10qHQ2SEJrnZ_Djh49VvyA';
        
        // CAMBIO CLAVE: Cambiamos el nombre de la variable a 'client' para no chocar con la librería
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function cargarSalas() {
            const mensaje = document.getElementById('mensaje-estado');
            try {
                // Pedimos los datos a Supabase
                const { data: recursos, error } = await client.from('recursos').select('*');
                
                if (error) throw error;

                const lista = document.getElementById('recursos-lista');
                lista.innerHTML = ''; // Limpiamos el "Cargando..."

                if (recursos.length === 0) {
                    lista.innerHTML = '<p>No hay recursos cargados en la base de datos.</p>';
                    return;
                }

                recursos.forEach(res => {
                    lista.innerHTML += `
                        <div class="card">
                            <h3>${res.nombre}</h3>
                            <p>👥 Capacidad: ${res.capacidad}</p>
                            <p>📍 Tipo: ${res.tipo}</p>
                            <p>Estado: <span class="status ${res.disponible ? 'disponible' : 'reservada'}">
                                ${res.disponible ? '✅ Disponible' : '❌ Reservada'}
                            </span></p>
                            ${res.disponible 
                                ? `<button onclick="reservar(${res.id})">Reservar Ahora</button>` 
                                : '<p style="text-align:center; color: #667">No disponible</p>'}
                        </div>`;
                });
            } catch (err) {
                console.error("Fallo la conexión:", err);
                mensaje.innerHTML = "❌ Error de conexión: " + err.message;
            }
        }

        async function reservar(id) {
            const { error } = await client
                .from('recursos')
                .update({ disponible: false })
                .eq('id', id);
            
            if (error) {
                alert("Error al reservar: " + error.message);
            } else {
                alert("¡Reserva confirmada con éxito! 🎉");
                cargarSalas(); // Recargamos para ver el cambio
            }
        }

        // Iniciamos la carga
        cargarSalas();
    </script>
</body>
</html>
